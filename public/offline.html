<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nelson-GPT - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #f2f2f2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .logo {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #ffffff;
    }
    
    .message {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.5;
      opacity: 0.9;
    }
    
    .retry-btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .retry-btn:hover {
      background: #f0f0f0;
      transform: translateY(-1px);
    }
    
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }
    
    @media (prefers-color-scheme: light) {
      body {
        background: #ffffff;
        color: #000000;
      }
      
      .logo {
        color: #000000;
      }
      
      .retry-btn {
        background: #000000;
        color: #ffffff;
      }
      
      .retry-btn:hover {
        background: #333333;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="offline-icon">📡</div>
    <h1 class="logo">Nelson-GPT</h1>
    <p class="message">
      You're currently offline. Please check your internet connection to access the pediatric medical assistant.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload()
    })
    
    // Update UI based on connection status
    function updateConnectionStatus() {
      if (navigator.onLine) {
        window.location.reload()
      }
    }
    
    // Check connection periodically
    setInterval(updateConnectionStatus, 5000)
  </script>
</body>
</html>
